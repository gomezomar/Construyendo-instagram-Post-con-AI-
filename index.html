<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Instagram Post</title>
</head>
<body>
    <div class="instagram-post">
  <header class="post-header">
    <div class="profile">
      <div class="profile-photo">
        <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&w=200&q=80" alt="Foto de perfil" />
      </div>
      <div class="profile-text">
        <p class="username">nombre_usuario</p>
        <p class="location">Ubicación</p>
      </div>
    </div>
    <div class="post-options" aria-label="Opciones de publicación">
      <button type="button">⋮</button>
    </div>
  </header>

  <div class="post-image" role="img" aria-label="Imagen de la publicación">
    <!-- Imagen de fondo con CSS o placeholder -->
  </div>

  <section class="post-actions">
    <div class="action-group">
      <button type="button" aria-label="Me gusta">
        <i class="icon-heart"></i>
      </button>
      <button type="button" aria-label="Comentario">
        <i class="icon-comment"></i>
      </button>
      <button type="button" aria-label="Enviar">
        <i class="icon-send"></i>
      </button>
    </div>
    <button type="button" aria-label="Guardar">
      <i class="icon-save"></i>
    </button>
  </section>

  <div class="post-content">
    <p class="likes-count"><i class="likes-icon" aria-hidden="true"></i>1,234 likes</p>
    <p class="caption">
      <span class="caption-username"><strong>nombre_usuario</strong></span>
      Texto descriptivo de la publicación, contando la historia detrás de la foto.
    </p>
  </div>
</div>
</body>
</html>
